# O9 nginx server block. Document root MUST be this project's public/
# directory — never the project root (config/, storage/, .env, and
# setup/database/migrations must never be web-reachable). Adjust
# server_name, the PHP-FPM socket path, and TLS for your environment.

server {
    listen 80;
    listen [::]:80;
    server_name example.com;
    root /path/to/project/public;
    index index.php;

    client_max_body_size 25m;

    # Single entry point — every non-file request goes through index.php,
    # which dispatches via App\Core\Router.
    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock; # adjust to your PHP-FPM pool
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Cache static assets; everything else still flows through PHP above.
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|woff2?|ttf)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # Dotfiles (.env if it were ever inside public/, .git, etc.) are never served.
    location ~ /\. {
        deny all;
    }
}
